<svg width="32" height="32" viewBox="0 0 64 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield body -->
  <path d="M32 2 L60 14 L60 42 Q60 58 32 70 Q4 58 4 42 L4 14 Z"
        fill="#0f172a" stroke="#1e293b" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Orange accent arc lower-left -->
  <path d="M6 50 Q8 62 20 68" stroke="#f97316" stroke-width="2.5"
        stroke-linecap="round" fill="none"/>

  <!-- Gear ring -->
  <circle cx="32" cy="34" r="9" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="32" cy="34" r="5" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <!-- Gear teeth (8) -->
  <line x1="32" y1="25" x2="32" y2="21.5" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38.36" y1="27.64" x2="40.9" y2="25.1" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="41" y1="34" x2="44.5" y2="34" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38.36" y1="40.36" x2="40.9" y2="42.9" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="43" x2="32" y2="46.5" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="25.64" y1="40.36" x2="23.1" y2="42.9" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23" y1="34" x2="19.5" y2="34" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="25.64" y1="27.64" x2="23.1" y2="25.1" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Lightning bolt -->
  <path d="M33 22 L27 35 L31.5 35 L30 46 L37 33 L32.5 33 Z" fill="#f97316"/>

  <!-- Wrench left diagonal -->
  <g transform="translate(15,34) rotate(-35)">
    <rect x="-2" y="-14" width="4" height="18" rx="2" fill="#64748b"/>
    <path d="M-4 4 Q-6 8 -3 11 L0 9 L3 11 Q6 8 4 4 Z" fill="#64748b"/>
  </g>

  <!-- Hammer right diagonal -->
  <g transform="translate(49,34) rotate(35)">
    <rect x="-2" y="-14" width="4" height="18" rx="2" fill="#64748b"/>
    <rect x="-6" y="-20" width="12" height="7" rx="2" fill="#64748b"/>
  </g>

  <!-- Cityscape -->
  <path d="M14 58 L14 53 L18 53 L18 51 L20 51 L20 53 L24 53 L24 50
           L26 50 L26 48 L28 48 L28 50 L30 50 L30 53 L34 53 L34 50
           L36 50 L36 48 L38 48 L38 50 L40 50 L40 53 L44 53 L44 51
           L46 51 L46 53 L50 53 L50 58 Z"
        fill="#1e3a5f" opacity="0.8"/>
</svg>
